events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_proxied any;
    gzip_min_length 256;

    upstream biz_backend {
        server biz-service:8080;
    }

    upstream ai_backend {
        server ai-service:8001;
    }

    upstream codegen_backend {
        server codegen-service:3002;
    }

    server {
        listen 80;
        server_name _;

        # Admin frontend (SPA)
        location / {
            root /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Go Biz API
        location /api/ {
            proxy_pass http://biz_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for chat streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # BaaS API (proxied through biz-service)
        location /baas/ {
            proxy_pass http://biz_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Python AI Service
        location /ai/ {
            proxy_pass http://ai_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for AI streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # CodeGen Service
        location /codegen/ {
            proxy_pass http://codegen_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location /health {
            proxy_pass http://biz_backend;
        }
    }
}
