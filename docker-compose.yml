version: '3.8'

services:
  # ========== Infrastructure ==========

  # PostgreSQL 16
  postgres:
    image: postgres:16-alpine
    container_name: hxbaby-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hxbaby
      POSTGRES_USER: hxbaby
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hxbaby_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hxbaby"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 7
  redis:
    image: redis:7-alpine
    container_name: hxbaby-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    container_name: hxbaby-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # etcd (Milvus dependency)
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: hxbaby-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Milvus 2.4 向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: hxbaby-milvus
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ========== Application Services ==========

  # Python AI Service (FastAPI)
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: hxbaby-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
    environment:
      AI_SERVICE_HOST: "0.0.0.0"
      AI_SERVICE_PORT: "8001"
      DATABASE_URL: postgresql://hxbaby:${DB_PASSWORD:-hxbaby_dev}@postgres:5432/hxbaby?sslmode=disable
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      EMBEDDING_MODEL: bge-large-zh-v1.5
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8001:8001"

  # Go Biz Service (Gin)
  biz-service:
    build:
      context: ./biz-service
      dockerfile: Dockerfile
    container_name: hxbaby-biz
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      BIZ_SERVICE_PORT: "8080"
      DATABASE_URL: postgresql://hxbaby:${DB_PASSWORD:-hxbaby_dev}@postgres:5432/hxbaby?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      AI_SERVICE_URL: http://ai-service:8001
      CODEGEN_SERVICE_URL: http://codegen-service:3002
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "8080:8080"

  # Node.js CodeGen Service (Express)
  codegen-service:
    build:
      context: ./codegen-service
      dockerfile: Dockerfile
    container_name: hxbaby-codegen
    restart: unless-stopped
    environment:
      PORT: "3002"
      BAAS_BASE_URL: ${BAAS_BASE_URL:-https://api.hxbaby.com}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    ports:
      - "3002:3002"

  # ========== Reverse Proxy ==========
  nginx:
    image: nginx:alpine
    container_name: hxbaby-nginx
    restart: unless-stopped
    depends_on:
      - biz-service
      - ai-service
      - codegen-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./factory-admin/dist:/usr/share/nginx/html/admin:ro

volumes:
  postgres_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_data:
