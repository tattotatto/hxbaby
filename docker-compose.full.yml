# 完整服务编排 — AI系统 + 工厂系统
version: '3.8'

services:
  # === 基础设施 ===
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hxbaby-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: hxbaby
      POSTGRES_USER: hxbaby
      POSTGRES_PASSWORD: hxbaby_dev
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: hxbaby-etcd
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes: [etcd_data:/etcd]

  minio:
    image: minio/minio:latest
    container_name: hxbaby-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /data --console-address ":9001"
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: hxbaby-milvus
    restart: unless-stopped
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports: ["19530:19530", "9091:9091"]
    volumes: [milvus_data:/var/lib/milvus]
    depends_on: [etcd, minio]

  redis:
    image: redis:7-alpine
    container_name: hxbaby-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redis_data:/data]

  # === 应用服务 ===
  ai-service:
    build: ./ai-service
    container_name: hxbaby-ai
    restart: unless-stopped
    ports: ["8001:8001"]
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - REDIS_URL=redis://redis:6379/0
    depends_on: [milvus, redis]
    volumes: [./ai-service:/app]

  biz-service:
    build: ./biz-service
    container_name: hxbaby-biz
    restart: unless-stopped
    ports: ["8080:8080"]
    environment:
      - DATABASE_URL=postgresql://hxbaby:hxbaby_dev@postgres:5432/hxbaby?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai-service:8001
      - CODEGEN_SERVICE_URL=http://codegen-service:3002
      - JWT_SECRET=${JWT_SECRET:-dev-secret}
    depends_on: [postgres, redis, ai-service]

  codegen-service:
    build: ./codegen-service
    container_name: hxbaby-codegen
    restart: unless-stopped
    ports: ["3002:3002"]
    depends_on: [biz-service]

volumes:
  pg_data:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
